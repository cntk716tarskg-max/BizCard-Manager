<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名刺管理</title>

  <!-- PWA / ホーム画面追加 -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="名刺管理">
  <meta name="theme-color" content="#1a6fd4">

  <!-- Apple Touch Icon（iPad / iPhone ホーム画面アイコン） -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ページロードオーバーレイ（認証状態確定まで表示） -->
  <div id="page-loading" class="page-loading">
    <div class="page-loading-inner">
      <span class="page-loading-spinner"></span>
      <p>読み込み中...</p>
    </div>
  </div>

  <!-- ログイン画面 -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="2" y="10" width="44" height="28" rx="6" fill="#1a6fd4"/>
          <rect x="2" y="10" width="44" height="10" rx="6" fill="#0c447c"/>
          <line x1="10" y1="28" x2="28" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
          <line x1="10" y1="34" x2="22" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <h1 class="login-title">名刺管理</h1>
      <p class="login-sub">Googleアカウントでログインして<br>名刺を管理しましょう</p>
      <button id="btn-google-login" class="btn-google-login">
        <!-- Google "G" ロゴ -->
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Googleでログイン
      </button>
      <p id="login-error" class="login-error hidden"></p>
    </div>
  </div>

  <!-- アプリ本体（ログイン後に表示） -->
  <div id="app-wrapper" class="hidden">

    <!-- ヘッダー -->
    <header class="header">
      <div class="header-inner">
        <div class="header-title">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <h1>名刺管理</h1>
        </div>
        <div class="header-actions">
          <button id="btn-export" class="btn btn-secondary btn-sm" title="CSVエクスポート">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>CSV出力</span>
          </button>
          <button id="btn-add" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>名刺を追加</span>
          </button>
          <!-- ユーザー情報 -->
          <div class="header-user">
            <img id="user-avatar" class="user-avatar hidden" src="" alt="" referrerpolicy="no-referrer">
            <button id="btn-logout" class="btn-logout" title="ログアウト">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main">
      <!-- 統計バー -->
      <div id="stats-bar" class="stats-bar">
        <span id="stats-total" class="stats-item">全0件</span>
        <span id="stats-filtered" class="stats-item stats-filtered hidden">表示中: 0件</span>
        <span id="stats-favorite" class="stats-item">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          お気に入り0件
        </span>
      </div>

      <!-- 検索・フィルターエリア -->
      <div class="filter-area">
        <div class="search-row">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="氏名・会社名・タグ などで検索...">
            <button id="search-clear" class="search-clear hidden" title="クリア">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="sort-row">
            <select id="sort-select" class="sort-select">
              <option value="updated_desc">更新日（新しい順）</option>
              <option value="updated_asc">更新日（古い順）</option>
              <option value="name_asc">氏名（五十音順）</option>
              <option value="company_asc">会社名（五十音順）</option>
            </select>
            <button id="btn-favorite-filter" class="btn-favorite-filter" title="お気に入りのみ表示">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- タグフィルター -->
        <div id="tag-filters" class="tag-filters"></div>
      </div>

      <!-- カードリスト -->
      <div id="card-list" class="card-list"></div>

      <!-- エンプティステート -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">
          <svg viewBox="0 0 80 80" fill="none">
            <rect x="10" y="20" width="60" height="40" rx="6" fill="#e6f1fb" stroke="#1a6fd4" stroke-width="2"/>
            <rect x="10" y="20" width="60" height="10" rx="6" fill="#1a6fd4"/>
            <line x1="22" y1="42" x2="45" y2="42" stroke="#378add" stroke-width="2" stroke-linecap="round"/>
            <line x1="22" y1="50" x2="38" y2="50" stroke="#378add" stroke-width="2" stroke-linecap="round"/>
            <circle cx="58" cy="46" r="8" fill="#f59e0b" opacity="0.2"/>
            <line x1="55" y1="46" x2="61" y2="46" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
            <line x1="58" y1="43" x2="58" y2="49" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">まだ名刺が登録されていません</p>
        <p class="empty-sub">「名刺を追加」ボタンから登録してください</p>
        <button class="btn btn-primary" id="btn-add-empty">名刺を追加する</button>
      </div>
    </main>

  </div><!-- /#app-wrapper -->

  <!-- フォームモーダル -->
  <div id="form-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="名刺フォーム">
    <div class="modal-container modal-form">
      <div class="modal-header">
        <h2 id="form-modal-title">名刺を追加</h2>
        <button class="modal-close" id="form-modal-close" title="閉じる">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="card-form" novalidate>
          <!-- 写真 -->
          <div class="form-section">
            <div class="form-section-title">名刺写真</div>
            <div id="photo-preview-area" class="photo-preview-area"></div>
            <label class="btn btn-secondary btn-sm photo-upload-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              写真を追加
              <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
            </label>
          </div>
          <!-- 基本情報 -->
          <div class="form-section">
            <div class="form-section-title">基本情報</div>
            <div class="form-grid">
              <div class="form-group full">
                <label for="field-name">氏名 <span class="required">*</span></label>
                <input type="text" id="field-name" name="name" placeholder="山田 太郎" autocomplete="off">
                <span class="field-error" id="error-name"></span>
              </div>
              <div class="form-group full">
                <label for="field-kana">ふりがな</label>
                <input type="text" id="field-kana" name="kana" placeholder="やまだ たろう" autocomplete="off">
              </div>
              <div class="form-group full">
                <label for="field-company">会社名 / 学校名</label>
                <input type="text" id="field-company" name="company" placeholder="〇〇株式会社" autocomplete="off">
              </div>
              <div class="form-group full">
                <label for="field-company-kana">会社名ふりがな</label>
                <input type="text" id="field-company-kana" name="companyKana" placeholder="まるまるかぶしきがいしゃ" autocomplete="off">
              </div>
              <div class="form-group">
                <label for="field-department">部署</label>
                <input type="text" id="field-department" name="department" placeholder="営業部" autocomplete="off">
              </div>
              <div class="form-group">
                <label for="field-position">役職</label>
                <input type="text" id="field-position" name="position" placeholder="部長" autocomplete="off">
              </div>
            </div>
          </div>
          <!-- 連絡先 -->
          <div class="form-section">
            <div class="form-section-title">連絡先</div>
            <div class="form-group full">
              <label>電話番号</label>
              <div id="phones-container"></div>
              <button type="button" id="btn-add-phone" class="btn-add-field">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                電話番号を追加
              </button>
            </div>
            <div class="form-group full">
              <label>メールアドレス</label>
              <div id="emails-container"></div>
              <button type="button" id="btn-add-email" class="btn-add-field">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                メールアドレスを追加
              </button>
            </div>
          </div>
          <!-- 住所 -->
          <div class="form-section">
            <div class="form-section-title">住所</div>
            <div class="form-grid">
              <div class="form-group">
                <label for="field-zip">郵便番号</label>
                <input type="text" id="field-zip" name="zipCode" placeholder="123-4567" autocomplete="off">
              </div>
              <div class="form-group full">
                <label for="field-address">住所</label>
                <textarea id="field-address" name="address" rows="2" placeholder="東京都千代田区〇〇1-2-3"></textarea>
              </div>
            </div>
          </div>
          <!-- タグ -->
          <div class="form-section">
            <div class="form-section-title">タグ</div>
            <div id="preset-tags" class="preset-tags"></div>
            <div class="form-group full" style="margin-top:8px">
              <label for="field-tag-input">カスタムタグ（Enterで追加）</label>
              <div class="tag-input-row">
                <input type="text" id="field-tag-input" placeholder="タグを入力..." autocomplete="off">
                <button type="button" id="btn-add-tag" class="btn btn-secondary btn-sm">追加</button>
              </div>
              <div id="custom-tags-area" class="custom-tags-area"></div>
            </div>
          </div>
          <!-- 備考 -->
          <div class="form-section">
            <div class="form-section-title">備考</div>
            <div class="form-group full">
              <textarea id="field-notes" name="notes" rows="3" placeholder="メモや備考を入力..."></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="form-cancel-btn">キャンセル</button>
        <button type="button" class="btn btn-primary" id="form-save-btn">保存する</button>
      </div>
    </div>
  </div>

  <!-- 詳細モーダル -->
  <div id="detail-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="名刺詳細">
    <div class="modal-container modal-detail">
      <div class="modal-header">
        <h2 id="detail-modal-title">名刺詳細</h2>
        <button class="modal-close" id="detail-modal-close" title="閉じる">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="detail-modal-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" id="detail-delete-btn">削除</button>
        <div style="flex:1"></div>
        <button type="button" class="btn btn-primary" id="detail-edit-btn">編集</button>
      </div>
    </div>
  </div>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <script src="js/auth.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/filter.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/form.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
